baseURL = "/"
languageCode = "ru-ru"
title = "Crimson Desert Гайды и Секреты"
theme = "PaperMod"

# Меню — все пункты здесь, без дублирования и без лишнего [menu]
[[menu.main]]
  identifier = "posts"
  name = "Гайды"
  url = "/posts/"
  weight = 1

[[menu.main]]
  identifier = "tags"
  name = "Теги"
  url = "/tags/"
  weight = 2

[pagination]
  pagerSize = 10

enableRobotsTXT = true

[params]
  author = "Kirill"
  description = "Гайды, секреты, билды и прокачка в Crimson Desert"
  
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  comments = true             # пока без сервиса комментариев не появятся
  listView = "card"
  ShowPostDate = true
  ShowViewMore = true
  ShowRecentPosts = true
  RecentPostsNumber = 6
  
  mainSections = ["posts"]
  homeInfoParams = {}         # пустой → отключает старый home-info

[params.cover]
  hidden = false
  hiddenInList = false
  hiddenInSingle = false
  responsiveImages = true

[minify]
  disableHTML = false
  disableXML  = false
  disableJSON = true
  disableCSS  = false
  disableJS   = false
  minifyOutput = true

[taxonomies]
  tag = "tags"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  page = ["HTML"]

[permalinks]
  posts = "/posts/:slug/"
  post  = "/posts/:slug/"

[imaging]
  quality = 75
  resampleFilter = "lanczos"
  anchor = "smart"

[params.profileMode]
  enabled = true
  title = "Crimson Desert Гайды и Секреты"
  subtitle = "Свежие гайды, секреты прокачки, Abyss Artifacts, skill mimicry и Pywel. Релиз 19 марта 2026 — всё здесь!"
  imageUrl = "/images/crimson-desert-featured.jpg"
  imageTitle = "Crimson Desert арт"
  imageWidth = 220
  imageHeight = 220

  [[params.profileMode.buttons]]
    name = "Все гайды"
    url = "/posts/"

  [[params.profileMode.buttons]]
    name = "Abyss Artifacts"
    url = "/posts/?tag=abyss-artifacts"

  [[params.profileMode.buttons]]
    name = "Skill Mimicry"
    url = "/posts/skill-mimicry-guide/"

  [[params.profileMode.socialIcons]]
    name = "telegram"
    url = "https://t.me/Olefinsd"