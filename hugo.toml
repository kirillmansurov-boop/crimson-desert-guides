baseURL = "/"                  # для локального теста и большинства хостингов ок; если домен — поменяй на "https://твой-домен.ru/"
languageCode = "ru-ru"
title = "Crimson Desert Гайды и Секреты"
theme = "PaperMod"

[pagination]
  pagerSize = 10
enableRobotsTXT = true

[params]
  author = "Kirill"          # ← поменяй на свой
  description = "Гайды, секреты, билды и прокачка в Crimson Desert"
  
  defaultTheme = "auto"        # auto / light / dark
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true       # хлебные крошки
  ShowCodeCopyButtons = true   # кнопка копировать код
  ShowToc = true               # оглавление в постах
  comments = false             # если потом подключишь — true
  
  mainSections = ["posts"]
  ShowRecentPosts = true
  RecentPostsNumber = 5
  
  # вид списка постов (карточки / список)
  # listView = "card"          # ← если хочешь именно карточки — раскомментируй

  # для главной страницы — информационный блок
[params.homeInfoParams]
  Title = "Crimson Desert Гайды и Секреты"
  Content = "Свежие гайды по прокачке, Abyss Artifacts, skill mimicry и секретам Pywel. Первая статья ниже!"

  # можно добавить соцсети (они появятся под текстом на главной)
[[params.socialIcons]]
  #   name = "github"
  #   url = "https://github.com/твой-ник"
  # [[params.socialIcons]]
  name = "telegram"
  url = "https://t.me/Olefinsd"

  # обложка (cover) для постов и страниц
[params.cover]
  hidden = false               # показывать обложку
  hiddenInList = false         # показывать в списках
  hiddenInSingle = false       # показывать в самих постах
  responsiveImages = true      # адаптивные изображения (рекомендуется)

[minify]
  disableHTML = false
  disableXML  = false
  disableJSON = true           # часто ломается schema, поэтому отключаем
  disableCSS  = false
  disableJS   = false
  minifyOutput = true

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Гайды"
    url = "/posts/"
    weight = 1

[taxonomies]
  tag = "tags"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  page = ["HTML"]

[permalinks]
  posts = "/posts/:slug/"
  post  = "/posts/:slug/"      # на всякий случай оба варианта

[imaging]
  quality = 75
  resampleFilter = "lanczos"
  anchor = "smart"

[params.profileMode]
  enabled = true                  # ← включает режим
  title = "Crimson Desert Гайды и Секреты"  # большой заголовок
  subtitle = "Свежие гайды, секреты прокачки, Abyss Artifacts, skill mimicry и Pywel. Релиз 19 марта 2026 — всё здесь!"  # подзаголовок
  imageUrl = "/images/crimson-desert-featured.jpg"   # ← твоя главная картинка (большая, квадратная лучше)
  imageTitle = "Crimson Desert арт"
  imageWidth = 220
  imageHeight = 220

  # кнопки под аватаркой (ссылки на разделы)
  buttons:
    - name: "Все гайды"
      url: "/posts/"
    - name: "Abyss Artifacts"
      url: "/posts/?tag=abyss-artifacts"   # если теги настроены
    - name: "Skill Mimicry"
      url: "/posts/skill-mimicry-guide/"   # прямая ссылка на топ-гайд

  # соцсети (опционально)
  socialIcons:
    - name: "telegram"
      url: "https://t.me/Olefinsd