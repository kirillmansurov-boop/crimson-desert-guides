baseURL = "/"                          # ← Самое важное! Только слеш, Cloudflare сам подставит домен
languageCode = "ru-ru"
title = "Crimson Desert Гайды и Секреты"
theme = "PaperMod"

[params]
  author = "Твой ник"
  description = "Гайды, секреты, билды и прокачка в Crimson Desert"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  defaultTheme = "auto"
  mainSections = ["posts"]
  ShowRecentPosts = true
  RecentPostsNumber = 5
  ShowAllPagesInLists = true
  listView = "card"                    # ← карточки в списке постов
  ShowSectionInList = true
  ShowSectionPosts = true
  ShowAllPosts = true
  ShowPagination = true
  paginate = 10
  showRecentInHome = true
  showAllPostsInSection = true

  # Разрешаем показ обложек в списках и на страницах постов
  cover:
    hiddenInList = false
    hiddenInSingle = false
    hidden = false

  # Для лучшей совместимости с Cloudflare
  enableRobotsTXT = true
  enableInlineShortcodes = true

[params.homeInfoParams]
  Title = "Crimson Desert Гайды и Секреты"
  Content = "Свежие гайды по прокачке, Abyss Artifacts, skill mimicry и секретам Pywel. Первая статья ниже!"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Гайды"
    url = "/posts/"
    weight = 1

[taxonomies]
  tag = "tags"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  page = ["HTML"]

# Важно для правильных URL постов (чтобы /posts/slug/ работал без .html)
[permalinks]
  posts = "/posts/:slug/"

# Оптимизация изображений (если используешь много картинок)
[imaging]
  quality = 75
  resampleFilter = "lanczos"
  anchor = "smart"